<!DOCTYPE html>
<html>
<head>
    <title>ARCHIVE LOGIN</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .terminal { border: 1px solid #00ff41; padding: 20px; box-shadow: 0 0 15px #00ff41; max-width: 80%; }
        input { background: transparent; border: none; border-bottom: 2px solid #00ff41; color: #00ff41; font-family: inherit; font-size: 1.2rem; outline: none; text-align: center; margin-top: 10px; }
        button { margin-top: 15px; background: #00ff41; color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="terminal" id="login-box">
    <h2>[SYSTEM_OVERRIDE_DETECTED]</h2>
    <p>ENTER ENCRYPTION KEY TO ACCESS DATA:</p>
    <input type="password" id="passInput">
    <br>
    <button onclick="checkPass()">DECRYPT</button>
</div>

<div class="terminal hidden" id="menu">
    <h2>ACCESS GRANTED</h2>
    <p>SELECT SECTOR DATA:</p>
    <ul>
        <li><a href="stage1.html" style="color:#00ff41">DOC_01</a></li>
        <li><a href="stage2.html" style="color:#00ff41">DOC_02</a></li>
    </ul>
</div>

<script>
    function checkPass() {
        const pass = document.getElementById('passInput').value;
        if(pass === 'BRAVO OMEGA OMEGA BRAVO SIERRA') {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
        } else {
            alert('INVALID CLEARANCE KEY');
        }
    }
</script>

</body>
</html>
